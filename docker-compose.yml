services:
  postgres:
    image: postgres:16-alpine
    container_name: umanitoba-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
      POSTGRES_DB: planner
    ports:
      - "5432:5432"
    volumes:
      - planner_pg_data:/var/lib/postgresql/data

volumes:
  planner_pg_data:
